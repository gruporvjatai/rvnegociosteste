<div class="flex flex-col h-full fade-in">
    <div class="flex justify-between items-center mb-6">
        <div>
            <h2 class="text-2xl font-bold text-slate-800">Catálogo de Produtos</h2>
            <p class="text-slate-500 text-sm">Gerencie materiais, blocos, madeiras e insumos</p>
        </div>
        <button onclick="abrirModalProduto()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg btn-action shadow-md">
            <i data-lucide="package-plus" class="w-5 h-5"></i> Novo Produto
        </button>
    </div>

    <div class="bg-white p-4 rounded-xl shadow-sm border mb-4 flex gap-4">
        <input type="text" id="busca-produto" placeholder="Buscar por nome ou código..." class="border rounded-lg px-4 py-2 w-full md:w-1/3">
        </div>

    <div class="bg-white rounded-xl shadow-sm border overflow-hidden flex-1">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-50 border-b text-slate-600">
                    <tr>
                        <th class="p-4 font-semibold text-sm">Código</th>
                        <th class="p-4 font-semibold text-sm">Descrição</th>
                        <th class="p-4 font-semibold text-sm">Categoria</th>
                        <th class="p-4 font-semibold text-sm">Unidade</th>
                        <th class="p-4 font-semibold text-sm text-center">Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-produtos-body" class="divide-y divide-slate-100">
                    </tbody>
            </table>
        </div>
    </div>

    </div>
