<div class="flex flex-col h-full fade-in">
    <div class="flex justify-between items-center mb-6">
        <div class="flex items-center gap-3">
            <button onclick="router.navigate('oc')" class="text-slate-500 hover:text-slate-800 transition-colors">
                <i data-lucide="arrow-left" class="w-6 h-6"></i>
            </button>
            <div>
                <h2 class="text-2xl font-bold text-slate-800">Nova Ordem de Compra</h2>
                <p class="text-slate-500 text-sm">Adicione produtos e gere o pedido</p>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 h-full">
        
        <div class="lg:col-span-2 flex flex-col gap-4">
            <div class="bg-white p-4 rounded-xl shadow-sm border">

                </div>
        </div>

        <div class="bg-white p-4 rounded-xl shadow-sm border flex flex-col h-full">

            </h3>
            
            <div id="carrinho-itens" class="flex-1 overflow-y-auto border-t border-b py-2 mb-4">
                </div>

            <div class="mt-auto">
                <div class="flex justify-between items-center mb-4 text-lg font-bold text-slate-800">
                    <span>Total:</span>
                    <span id="carrinho-total">R$ 0,00</span>
                </div>
                <button onclick="finalizarOrdemCompra()" class="w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-lg font-bold shadow-lg transition-all">
