<div class="flex flex-col h-full fade-in">
    <div class="flex justify-between items-center mb-6">
        <div>
            <h2 class="text-2xl font-bold text-slate-800">Financeiro Obras</h2>
            <p class="text-slate-500 text-sm">Gestão de custos, medições e pagamentos</p>
        </div>
        <div class="flex gap-2">
            <button onclick="abrirModalNovaDespesa()" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg btn-action shadow-md">
                <i data-lucide="trending-down" class="w-5 h-5"></i> Nova Despesa
            </button>
            <button onclick="abrirModalNovaReceita()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg btn-action shadow-md">
                <i data-lucide="trending-up" class="w-5 h-5"></i> Nova Receita
            </button>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
        <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200">
            <h3 class="text-slate-500 text-sm font-medium">Saldo Geral</h3>
            <p id="saldo-geral-texto" class="text-2xl font-bold text-slate-800 mt-1">R$ 0,00</p>
        </div>
        </div>

    <div class="bg-white p-4 rounded-xl shadow-sm border mb-4 flex gap-4">
        <select id="filtro-obra-financeiro" class="border rounded-lg px-4 py-2 w-full md:w-1/3">
            <option value="">Todas as Obras</option>
            </select>
    </div>

    <div class="bg-white rounded-xl shadow-sm border overflow-hidden flex-1">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-50 border-b text-slate-600">
                    <tr>
                        <th class="p-4 font-semibold text-sm">Data</th>
                        <th class="p-4 font-semibold text-sm">Descrição</th>
                        <th class="p-4 font-semibold text-sm">Obra</th>
                        <th class="p-4 font-semibold text-sm">Tipo</th>
                        <th class="p-4 font-semibold text-sm">Valor</th>
                        <th class="p-4 font-semibold text-sm text-center">Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-financeiro-body" class="divide-y divide-slate-100">
                    </tbody>
            </table>
        </div>
    </div>

    </div>
